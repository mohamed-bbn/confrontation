    <section class="multible-choice">
        <div class="contentinner">
            <div class="itemcomplete">
                <h2 class="title mobile-title">أكمل المثل </h2>
                <div class="timer-wrapper">
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar"></div>
                        <div class="progress-dot" id="progressDot"></div>
                    </div>
                    <div class="circle-timer" id="timerCircle">
                        <div class="star-container" id="starBg">
                            <img loading="lazy" src="images/star.svg" alt="المواجهة">
                        </div>
                        <div class="counter-text" id="num">10</div>
                    </div>
                    <!-- End circle-timer -->
                </div>
                <!-- End subinner -->
                <div class="question">
                    <h3 class="title">أكمل المثل التالي</h3>
                </div>
                <div class="proverb">
                    <h4 class="title">اللي ما يعرف الصقر</h4>
                    <input class="form-control" type="text" placeholder="------------------------------------------------------------------------">
                </div>
            </div>
            <!-- End inner -->
        </div>
        <!-- End contentinner -->
