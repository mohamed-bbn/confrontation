<body>

    <div class="wrapper">

        <header class="header-competition">
            <div class="container">

                <div class="btn-actions">
                    <div class="flex">
                        <div class="bottom green"> دور الفريق : الاول</div>
                    </div>

                    <div class="bottom purple"> دور الفريق : الثانى</div>
                </div> -->
                </div>
                <!-- End bottoms -->

                <div class="logo">
                    <a href="index.html" title="المواجهة">
                        <img loading="lazy" src="images/logo.png" alt="المواجهة">
                    </a>
                </div>
                <!-- ENd logo -->


                <div class="actions">
                    <h1 class="title">خيارات من اربعة</h1>
                    <a href="#" class="itemlink">
                    شرح اللعبة

                </a>
                </div>
            </div>
        </header>
        <!-- End header -->

        <section class="multible-choice">
            <div class="contentinner">
                <h2 class="title mobile-title">خيارات من اربعة</h2>
                <div class="inneroptions">
                    <div class="timer-wrapper">
                        <div class="progress-container">
                            <div class="progress-bar" id="progressBar"></div>
                            <div class="progress-dot" id="progressDot"></div>
                        </div>
                        <div class="circle-timer" id="timerCircle">
                            <div class="star-container" id="starBg">
                                <img loading="lazy" src="images/star.svg" alt="المواجهة">
                            </div>
                            <div class="counter-text" id="num">10</div>
                        </div>
                        <!-- End circle-timer -->
                    </div>
                    <!-- End subinner -->
                    <div class="question">
                        <h3 class="title">ما هي عاصمة مصر</h3>
                    </div>
                    <div class="subradio">
                        <label class="che-box">
                        <input type="radio" name="radio">
                        <div class="label-text">   
                            <span class="text-chek">الرياض</span>
                            <i class="icon">
                                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M10.75 21.5C4.813 21.5 0 16.687 0 10.75C0 4.813 4.813 0 10.75 0C16.687 0 21.5 4.813 21.5 10.75C21.5 16.687 16.687 21.5 10.75 21.5ZM13.997 6.68896L9.203 11.919L7.44199 10.158L6.027 11.572L9.26599 14.811L15.472 8.04102L13.997 6.68896Z" fill="white"/>
                                </svg>
                            </i>
                        </div>
                    </label>
                        <!-- End che-box -->
                        <label class="che-box">
                        <input type="radio" name="radio">
                        <div class="label-text">   
                            <span class="text-chek">عمان </span>
                             <i class="icon">
                                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M10.75 21.5C4.813 21.5 0 16.687 0 10.75C0 4.813 4.813 0 10.75 0C16.687 0 21.5 4.813 21.5 10.75C21.5 16.687 16.687 21.5 10.75 21.5ZM13.997 6.68896L9.203 11.919L7.44199 10.158L6.027 11.572L9.26599 14.811L15.472 8.04102L13.997 6.68896Z" fill="white"/>
                                </svg>
                            </i>
                        </div>
                    </label>
                        <!-- End che-box -->
                        <label class="che-box">
                        <input type="radio" name="radio">
                        <div class="label-text">   
                            <span class="text-chek">القاهرة</span>
                             <i class="icon">
                                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M10.75 21.5C4.813 21.5 0 16.687 0 10.75C0 4.813 4.813 0 10.75 0C16.687 0 21.5 4.813 21.5 10.75C21.5 16.687 16.687 21.5 10.75 21.5ZM13.997 6.68896L9.203 11.919L7.44199 10.158L6.027 11.572L9.26599 14.811L15.472 8.04102L13.997 6.68896Z" fill="white"/>
                                </svg>
                            </i>
                        </div>
                    </label>
                        <!-- End che-box -->
                        <label class="che-box">
                        <input type="radio" name="radio">
                        <div class="label-text">   
                            <span class="text-chek">بيروت</span>
                             <i class="icon">
                                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M10.75 21.5C4.813 21.5 0 16.687 0 10.75C0 4.813 4.813 0 10.75 0C16.687 0 21.5 4.813 21.5 10.75C21.5 16.687 16.687 21.5 10.75 21.5ZM13.997 6.68896L9.203 11.919L7.44199 10.158L6.027 11.572L9.26599 14.811L15.472 8.04102L13.997 6.68896Z" fill="white"/>
                                </svg>
                            </i>
                        </div>
                    </label>
                        <!-- End che-box -->
                    </div>

                </div>
                <!-- End inneroptions -->
            </div>
            <!-- End container -->



            <div class="auxiliary-means">
                <div class="subinner">
                    <div class="flex">
                        <div class="bottom green">الفريق الاول</div>
                        <span class="itemnumber">0</span>
                    </div>
                    <div class="flex">
                        <div class="bottom purple">الفريق الثانى</div>
                        <span class="itemnumber">0</span>
                    </div>
                </div>
                <!-- End subinner -->
                <div class="difference">
                    <div class="headtitle">
                        <h3 class="title">وسائل المساعدة</h3>
                        <div class="bottom green">الفريق الاول</div>
                    </div>
                    <!-- End headtitle -->
                    <div class="flex">
                        <a href="#" class="game-card">
                            <img loading="lazy" src="images/card-yellow.png" alt="المواجهة">

                            </svg>
                            </div>
                        </a>
                        <!-- End game-card -->
                        <a href="#" class="game-card">
                            <img loading="lazy" src="images/card-blue.png" alt="المواجهة">
                        </a>
                        <!-- End game-card -->
                        <a href="#" class="game-card">
                            <img loading="lazy" src="images/card-red.png" alt="المواجهة">
                        </a>
                        <!-- End game-card -->
                        <a href="#" class="game-card">
                            <img loading="lazy" src="images/card-blak.png" alt="المواجهة">
                        </a>
                        <!-- End game-card -->
                    </div>
                    <!-- End flex -->
                </div>
                <!-- End difference -->
                <div class="difference">
                    <div class="headtitle">
                        <h3 class="title">وسائل المساعدة</h3>
                        <div class="bottom purple"> الفريق الثاني</div>
                    </div>
                    <!-- End headtitle -->
                    <div class="flex">
                        <a href="#" class="game-card">
                            <img loading="lazy" src="images/card-yellow.png" alt="المواجهة">
                        </a>
                        <!-- End game-card -->
                        <a href="#" class="game-card">
                            <img loading="lazy" src="images/card-blue.png" alt="المواجهة">
                        </a>
                        <!-- End game-card -->
                        <a href="#" class="game-card">
                            <img loading="lazy" src="images/card-red.png" alt="المواجهة">
                        </a>
                        <!-- End game-card -->
                        <a href="#" class="game-card">
                            <img loading="lazy" src="images/card-blak.png" alt="المواجهة">
                        </a>
                        <!-- End game-card -->
                    </div>
                    <!-- End flex -->
                </div>
                <!-- End difference -->
                <div class="btnending">
                    <a href="#" class="ending">
                    إنهاء اللعبة
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">

    </div>
